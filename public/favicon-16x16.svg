<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo com gradiente -->
  <circle cx="8" cy="8" r="8" fill="url(#gradient16)" />
  
  <!-- PawPrint icon simplificado para 16x16 -->
  <g transform="translate(4, 4)" fill="white">
    <!-- Pata principal -->
    <ellipse cx="4" cy="6" rx="1" ry="1.5" />
    
    <!-- Dedos da pata -->
    <ellipse cx="2" cy="4" rx="0.75" ry="1" />
    <ellipse cx="4" cy="3" rx="0.75" ry="1" />
    <ellipse cx="6" cy="4" rx="0.75" ry="1" />
    
    <!-- Almofada principal -->
    <ellipse cx="4" cy="5" rx="0.5" ry="0.75" />
  </g>
</svg>
