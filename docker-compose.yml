version: '3.8'

services:
  vetnux-website-1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "3001:3000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - shared-network

  vetnux-website-2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "3002:3000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - shared-network

networks:
  shared-network:
    external: true
